name: Daily Diavgeia Fetch

on:
  schedule:
    - cron: "0 03 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily fetch
        id: run_fetch
        continue-on-error: true
        run: python fetch_diavgeia.py

      - name: Commit and push changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/2026_diavgeia.csv state/state.json logs/fetch_runs.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): daily Diavgeia update"
          git push

      - name: Fail job if fetch failed
        if: steps.run_fetch.outcome == 'failure'
        run: |
          echo "Daily fetch failed; see logs/fetch_runs.csv and job output."
          exit 1
