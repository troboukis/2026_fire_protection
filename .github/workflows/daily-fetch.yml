name: Daily Data Refresh

on:
  schedule:
    - cron: "0 5,8,14,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_GEOCODING_API_KEY: ${{ secrets.GOOGLE_GEOCODING_API_KEY }}
      DOWNLOAD_DIAVGEIA_PDFS: "0"
      REBUILD_ORG_MAPPINGS: "0"
      ERD_TABLES: "region,municipality,organization,diavgeia_document_type,procurement,cpv,diavgeia,payment,fund,diavgeia_procurement,beneficiary"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync branch to latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-ell

      - name: Validate required secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is required for Copernicus + ERD ingest."
            exit 1
          fi
          case "${DATABASE_URL}" in
            DATABASE_URL=*)
              echo "DATABASE_URL secret must contain only the raw connection string, not 'DATABASE_URL=...'."
              exit 1
              ;;
          esac

      - name: Refresh source datasets
        run: |
          python fetch_diavgeia.py
          python src/filter_relevance.py --allow-ci
          python fetch_kimdis_procurements.py

      - name: Refresh Copernicus data in database
        run: python src/fetch_copernicus.py

      - name: Sync refreshed datasets to application database
        run: python ingest/stage2_load_erd.py --tables "$ERD_TABLES"

      - name: Backfill canonical organization authority scopes
        run: python scripts/backfill_organization_authority_scope.py

      - name: Reload organization municipality coverage
        run: python scripts/load_org_municipality_coverage.py

      - name: Locate works for new municipality, region, and ADMIE procurements
        run: python src/run_locate_work_updates.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/2026_diavgeia.csv \
            data/2026_diavgeia_filtered.csv \
            data/fires/copernicus_latest.csv \
            data/raw_procurements.csv \
            state/kimdis_state.json \
            state/locate_work_state.json \
            state/state.json \
            logs/fetch_runs.csv \
            logs/locate_work_runs.csv \
            logs/org_municipality_coverage_unresolved.csv \
            logs/relevance_filter_runs.csv \
            logs/kimdis_fetch_runs.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): daily refresh"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after ${attempt} attempts"
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
          done
