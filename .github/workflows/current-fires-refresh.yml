name: Current Fires Refresh

on:
  schedule:
    - cron: "23 0,6-23 * * *"
      timezone: "Europe/Athens"
  workflow_dispatch:
 
permissions:
  contents: read

concurrency:
  group: current-fires-refresh
  cancel-in-progress: false

jobs:
  refresh-current-fires:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt beautifulsoup4 lxml

      - name: Validate required secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is required for current_fires refresh."
            exit 1
          fi
          case "${DATABASE_URL}" in
            DATABASE_URL=*)
              echo "DATABASE_URL secret must contain only the raw connection string, not 'DATABASE_URL=...'."
              exit 1
              ;;
          esac

      - name: Refresh current fires
        run: python src/scrape_forest_fires.py
