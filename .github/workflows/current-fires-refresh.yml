name: Current Fires Refresh

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:
 
permissions:
  contents: read

concurrency:
  group: current-fires-refresh
  cancel-in-progress: true

jobs:
  refresh-current-fires:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt beautifulsoup4 lxml

      - name: Validate required secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is required for current_fires refresh."
            exit 1
          fi
          case "${DATABASE_URL}" in
            DATABASE_URL=*)
              echo "DATABASE_URL secret must contain only the raw connection string, not 'DATABASE_URL=...'."
              exit 1
              ;;
          esac

      - name: Check Athens schedule window
        id: athens_window
        run: |
          athens_hour="$(TZ=Europe/Athens date +%H)"
          athens_time="$(TZ=Europe/Athens date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "athens_time=${athens_time}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${athens_hour}" = "00" ] || { [ "${athens_hour}" -ge 6 ] && [ "${athens_hour}" -le 23 ]; }; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "athens_time=${{ steps.athens_window.outputs.athens_time }}"
          echo "should_run=${{ steps.athens_window.outputs.should_run }}"

      - name: Skip outside local window
        if: steps.athens_window.outputs.should_run != 'true'
        run: |
          echo "Skipping current_fires refresh outside 06:23-00:23 Europe/Athens. Local time: ${{ steps.athens_window.outputs.athens_time }}"

      - name: Refresh current fires
        if: steps.athens_window.outputs.should_run == 'true'
        run: python src/scrape_forest_fires.py
